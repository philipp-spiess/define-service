name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build package
        run: bun run build

      - name: Run unit tests
        run: bun test test/unit

      - name: Run end-to-end tests on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: sudo env "PATH=$PATH" bun test test/e2e

      - name: Run end-to-end tests
        if: runner.os != 'Linux'
        run: bun test test/e2e
